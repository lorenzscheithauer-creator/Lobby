<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameolympics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="name-popup" class="popup-container">
        <div class="popup-content">
            <h2>Willkommen!</h2>
            <p>Bitte gib deinen Namen für diese Session ein:</p>
            <input type="text" id="name-input" placeholder="Dein Name">
            <button id="submit-name">Bestätigen</button>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <header>
            <h1>Gameolympics</h1>
        </header>

        <div class="top-section">
            <div class="games-section">
                <h2>Spiele</h2>
                <div class="games-container">
                    <div class="game-placeholder"></div>
                    <div class="game-placeholder"></div>
                    <div class="game-placeholder"></div>
                    <div class="game-placeholder"></div>
                </div>
            </div>
            <div class="wheel-section">
                <div class="wheel-placeholder"></div>
            </div>
        </div>

        <main>
            <h2>Lobby</h2>
            <div class="button-container">
                <button id="create-public">Öffentlich erstellen</button>
                <button id="create-private">Privat erstellen</button>
            </div>
            <div id="groups-container">
                <!-- Hier werden die Lobbys (rote Rechtecke) eingefügt -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
